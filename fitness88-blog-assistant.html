function classify(text) {
  const t = String(text);
  if (/재활|통증|천장관절|거북목|라운드숄|무릎|허리|골반|어깨|그라스톤|디스크|수술|근막/.test(t)) return "rehab";
  if (/바디프로필|웨딩/.test(t)) return "profile";
  if (/다이어트|감량|체지방|상승다이어트|산후/.test(t)) return "diet";
  if (/체형|교정|자세|코어/.test(t)) return "posture";
  if (/이벤트|할인|해피아워|휴무|공지|혜택/.test(t)) return "event";
  if (/소개|시설|트레이너|정보|검사|상담/.test(t)) return "intro";
  return "etc";
}

// ── 섹션 카드 ──
function SectionCard({ section, index, copiedKey, onCopy }) {
  const { title, body, type } = section;
  const Icon = type === "title" ? Hash : type === "hashtag" ? Hash : type === "intro" ? Heart : type === "outro" ? MapPin : BookOpen;
  const key = "sec" + index;

  if (type === "title") {
    const titles = body.split("\n").map((l) => l.replace(/^\s*(\d+\.|[-*])\s*/, "").trim()).filter(Boolean);
    return (
      <div className="card" style={{ animationDelay: index * 0.06 + "s" }}>
        <div className="card-h"><span className="t"><Hash size={15} /> {title}</span></div>
        <div className="titlelist">
          {titles.map((t, i) => {
            const k = key + "-t" + i;
            return (
              <div key={i} className={`titlerow ${copiedKey === k ? "copied" : ""}`} onClick={() => onCopy(t, k)} title="클릭하면 복사됩니다">
                <span className="num">{i + 1}</span>
                <span className="tx">{t}</span>
                {copiedKey === k ? <Check size={15} className="cp" /> : <Copy size={15} className="cp" />}
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  if (type === "hashtag") {
    const tags = body.match(/#[^\s#]+/g) || [];
    return (
      <div className="card" style={{ animationDelay: index * 0.06 + "s" }}>
        <div className="card-h">
          <span className="t"><Hash size={15} /> {title}</span>
          <button className={`icp ${copiedKey === key ? "copied" : ""}`} onClick={() => onCopy(tags.join(" "), key)}>
            {copiedKey === key ? <Check size={13} /> : <Copy size={13} />} 태그 복사
          </button>
        </div>
        <div className="htags">{tags.map((t, i) => <span key={i}>{t}</span>)}</div>
      </div>
    );
  }

  return (
    <div className="card" style={{ animationDelay: index * 0.06 + "s" }}>
      <div className="card-h">
        <span className="t"><Icon size={15} /> {title}</span>
        <button className={`icp ${copiedKey === key ? "copied" : ""}`} onClick={() => onCopy(body, key)}>
          {copiedKey === key ? <Check size={13} /> : <Copy size={13} />} 복사
        </button>
      </div>
      <div className="body-md"><Markdown text={body} /></div>
    </div>
  );
}

// ── 발행 전 체크리스트 ──
function PublishChecklist({ result, charCount, keywords, topic }) {
  const MANUAL = [
    "직접 찍은 사진(회원 변화·시설·수업)을 2장 이상 넣었다",
    "원장·트레이너의 직접 코멘트를 1~2문장 넣었다",
    "구체적 수치·기간·실제 사례를 채웠다 (지어내지 않음)",
    "이 글이 우리 전문 주제(재활·통증·PT) 축과 연결된다",
  ];
  const [checks, setChecks] = useState([false, false, false, false]);
  const toggle = (i) => setChecks((c) => c.map((v, j) => (j === i ? !v : v)));

  const titleBlock = result.split(/##\s*본문/)[0] || result;
  const bodyBlock = (result.split(/##\s*본문/)[1] || result).split(/##\s*추천\s*해시태그/)[0];
  const tagCount = (result.match(/#[^\s#]+/g) || []).length;
  const kwIn = keywords.filter((k) => result.includes(k)).length;
  const kwInTitle = keywords.filter((k) => titleBlock.includes(k)).length;

  // 제목에 대표(지역)+구체(주제) 2종 결합 여부
  const topicWord = (topic || "").trim().split(/[ ,·]/)[0] || "";
  const regionInTitle = REGIONS.some((r) => titleBlock.includes(r));
  const specificInTitle = topicWord ? titleBlock.includes(topicWord) : kwInTitle > 0;
  const comboOk = topic ? (regionInTitle && specificInTitle) : null;

  // 본문 내 키워드 과다 반복(3회 이상) 여부
  const terms = [...new Set([...keywords, ...REGIONS])].filter(Boolean);
  const occ = (term) => (bodyBlock.match(new RegExp(term.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"), "g")) || []).length;
  const maxRep = terms.reduce((m, t) => Math.max(m, occ(t)), 0);
  const repTerm = terms.find((t) => occ(t) === maxRep);

  const auto = [
    { label: "본문 분량 1,000자 이상", ok: charCount >= 1000, val: charCount.toLocaleString() + "자" },
    { label: "해시태그 10개", ok: tagCount >= 10, val: tagCount + "개" },
    { label: "선택 키워드 본문 포함", ok: keywords.length === 0 ? null : kwIn === keywords.length, val: keywords.length ? `${kwIn}/${keywords.length}` : "미선택" },
    { label: "선택 키워드 제목에도 포함", ok: keywords.length === 0 ? null : kwInTitle > 0, val: keywords.length ? `${kwInTitle}/${keywords.length}` : "미선택" },
    { label: "제목에 대표+구체 키워드 결합", ok: comboOk, val: comboOk === null ? "—" : comboOk ? "양호" : "보강 권장" },
    { label: "같은 키워드 과다 반복 없음 (3회 미만)", ok: maxRep < 3, val: maxRep >= 3 ? `'${repTerm}' ${maxRep}회` : `최대 ${maxRep}회` },
  ];
  const counted = auto.filter((a) => a.ok !== null);
  const total = MANUAL.length + counted.length;
  const done = checks.filter(Boolean).length + counted.filter((a) => a.ok).length;
  const pct = total ? Math.round((done / total) * 100) : 0;

  return (
    <div className="card chk" style={{ animationDelay: "0.32s" }}>
      <div className="card-h">
        <span className="t"><ListChecks size={15} /> 발행 전 체크리스트</span>
        <span style={{ fontSize: 12, color: "var(--accent-soft)", fontWeight: 700 }}>{done}/{total}</span>
      </div>
      <div className="prog"><i style={{ width: pct + "%" }} /></div>
      <p className="lead">네이버 검색은 출처의 전문성(C-Rank)과 실제 경험·검색 의도 충족(D.I.A./D.I.A.+)을 중요하게 봅니다. AI 초안에 아래 ‘실제 경험’을 더하면 고품질 문서로 평가받을 가능성이 높아져요. (※ 알고리즘 가중치는 비공개이며 보장은 아닙니다)</p>

      <div className="grp">
        <p className="gt">실제 경험 더하기 · D.I.A.</p>
        {MANUAL.map((m, i) => (
          <div key={i} className={`crow ${checks[i] ? "done" : ""}`} onClick={() => toggle(i)}>
            {checks[i] ? <CheckCircle2 size={17} className="bx" /> : <Circle size={17} className="bx" />}
            <span>{m}</span>
          </div>
        ))}
      </div>

      <div className="grp">
        <p className="gt">검색 노출 자동 진단 · C-Rank·D.I.A.+</p>
        {auto.map((a, i) => (
          <div key={i} className="crow ro">
            {a.ok === null ? <Circle size={17} className="bx" />
              : a.ok ? <CheckCircle2 size={17} className="bx ok" />
              : <AlertCircle size={17} className="bx no" />}
            <span>{a.label} <b style={{ color: "var(--muted2)", fontWeight: 600 }}>· {a.val}</b></span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── 콘텐츠 주제 트래커 (C-Rank) ──
function TopicTracker({ log, onAdd, onRemove }) {
  const [val, setVal] = useState("");
  const [cat, setCat] = useState(CATS[0].id);
  const add = () => { if (!val.trim()) return; onAdd(val.trim(), cat); setVal(""); };

  const counts = {};
  CATS.forEach((c) => (counts[c.id] = 0));
  log.forEach((e) => (counts[e.cat] = (counts[e.cat] || 0) + 1));
  const max = Math.max(1, ...Object.values(counts));
  const total = log.length;
  const sorted = [...CATS].sort((a, b) => counts[b.id] - counts[a.id]);
  const top = sorted[0];
  const topPct = total ? Math.round((counts[top.id] / total) * 100) : 0;
  const corePct = total ? Math.round((log.filter((e) => CORE_CATS.includes(e.cat)).length / total) * 100) : 0;
  const msg = total < 3
    ? "글이 더 쌓이면 주제 집중도를 분석해 드려요."
    : corePct >= 70
      ? `전문 주제(재활·통증·다이어트·체형교정)에 ${corePct}% 집중되어 있어, 출처 전문성(C-Rank)에 유리한 구성입니다.`
      : `전문 주제 집중도가 ${corePct}%입니다. 핵심 분야(재활·통증·다이어트) 글 비중을 조금 더 높이면 C-Rank에 유리해집니다.`;

  return (
    <section className="panel track" style={{ marginTop: 22 }}>
      <h2 className="panel-title" style={{ marginBottom: 8 }}>
        <BarChart3 size={16} /> 콘텐츠 주제 트래커
        <span className="badge" style={{ marginLeft: 2 }}>C-Rank · 주제 전문성</span>
      </h2>
      <p style={{ fontSize: 12.5, color: "var(--muted)", margin: "0 0 16px", lineHeight: 1.55 }}>
        발행했거나 생성한 글의 주제를 분류해, 한 분야에 집중되는지(=출처 전문성)를 보여줍니다. 글 생성 시 자동 추가되며, 이미 발행한 글도 직접 추가할 수 있어요.
      </p>

      <div className="catchips">
        {CATS.map((c) => (
          <button key={c.id} className={`qchip ${cat === c.id ? "on" : ""}`} onClick={() => setCat(c.id)}>{c.label}</button>
        ))}
      </div>
      <div className="addrow">
        <input className="tinput" value={val} onChange={(e) => setVal(e.target.value)}
          onKeyDown={(e) => { if (e.key === "Enter") add(); }} placeholder="발행한 글 주제/제목 입력 후 추가" />
        <button className="taddbtn" onClick={add}><Plus size={16} /> 추가</button>
      </div>

      <div>
        {sorted.filter((c) => counts[c.id] > 0).map((c) => (
          <div className="tbar" key={c.id}>
            <span className="tname">{c.label}</span>
            <span className="ttrack"><i style={{ width: (counts[c.id] / max) * 100 + "%" }} /></span>
            <span className="tcnt">{counts[c.id]}</span>
          </div>
        ))}
      </div>

      <div className="tsum">총 <b>{total}편</b> · 최다 주제 <b>{top.label}</b> ({topPct}%)<br />{msg}</div>

      <div className="tlog">
        {log.map((e) => (
          <span className="tchip" key={e.id}>{e.label}
            <button onClick={() => onRemove(e.id)} title="삭제"><X size={12} /></button>
          </span>
        ))}
      </div>
    </section>
  );
}

// ── 섹션 파서 ──
function parseSections(md) {
  if (!md) return [];
  const lines = md.replace(/\r/g, "").split("\n");
  const secs = []; let cur = null;
  for (const ln of lines) {
    const m = ln.match(/^#{1,2}\s+(.*)/);
    if (m && !/^###/.test(ln)) { if (cur) secs.push(cur); cur = { title: m[1].trim(), body: [] }; }
    else if (cur) cur.body.push(ln);
  }
  if (cur) secs.push(cur);
  return secs.map((s) => {
    const tl = s.title;
    let type = "normal";
    if (/제목/.test(tl)) type = "title";
    else if (/해시|태그/.test(tl)) type = "hashtag";
    else if (/도입|인트로/.test(tl)) type = "intro";
    else if (/마무리|마지막|예약/.test(tl)) type = "outro";
    return { title: tl, body: s.body.join("\n").trim(), type };
  });
}

// ── 마크다운(본문용) ──
function Markdown({ text }) {
  const lines = text.replace(/\r/g, "").split("\n");
  const out = []; let list = null; let k = 0;
  const flush = () => {
    if (!list) return;
    const items = list.items.map((it, i) => <li key={i}>{inline(it)}</li>);
    out.push(list.type === "ol" ? <ol key={k++}>{items}</ol> : <ul key={k++}>{items}</ul>);
    list = null;
  };
  for (const raw of lines) {
    const line = raw.trimEnd();
    if (!line.trim()) { flush(); continue; }
    if (/^###\s+/.test(line)) { flush(); out.push(<h3 key={k++}>{inline(line.replace(/^###\s+/, ""))}</h3>); }
    else if (/^\s*\d+\.\s+/.test(line)) { if (!list || list.type !== "ol") { flush(); list = { type: "ol", items: [] }; } list.items.push(line.replace(/^\s*\d+\.\s+/, "")); }
    else if (/^\s*[-*]\s+/.test(line)) { if (!list || list.type !== "ul") { flush(); list = { type: "ul", items: [] }; } list.items.push(line.replace(/^\s*[-*]\s+/, "")); }
    else { flush(); out.push(<p key={k++}>{inline(line.trim())}</p>); }
  }
  flush();
  return <>{out}</>;
}
function inline(str) {
  return str.split(/(\*\*[^*]+\*\*)/g).map((p, i) =>
    /^\*\*[^*]+\*\*$/.test(p) ? <strong key={i}>{p.slice(2, -2)}</strong> : <React.Fragment key={i}>{p}</React.Fragment>);
}
